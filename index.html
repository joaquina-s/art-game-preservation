<!DOCTYPE html>
<!--
  Root redirect for GitHub Pages. The interface lives in /web so the Node
  server can serve it cleanly; on Pages we forward the root URL to it.
  (The local server at http://localhost:5000 serves /web directly and never
  uses this file.)
-->
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="refresh" content="0; url=./web/" />
    <link rel="canonical" href="./web/" />
    <title>revenant — preservación de art games</title>
    <style>
      html, body { height: 100%; margin: 0; background: #02060b; color: #4ff0d0;
        font-family: ui-monospace, Menlo, Consolas, monospace;
        display: grid; place-items: center; }
      a { color: #4ff0d0; }
    </style>
  </head>
  <body>
    <p>Descendiendo al archivo… <a href="./web/">entrar</a></p>
  </body>
</html>
