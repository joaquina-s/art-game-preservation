<!DOCTYPE html>
<!--
  Root redirect for GitHub Pages. The interface lives in /web so the Node
  server can serve it cleanly; on Pages we forward the root URL to it.
  (The local server at http://localhost:5000 serves /web directly and never
  uses this file.)
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="refresh" content="0; url=./web/" />
    <link rel="canonical" href="./web/" />
    <title>revenant — art game preservation (interface preview)</title>
    <style>
      html, body { height: 100%; margin: 0; background: #ffffff; color: #0a0a0a;
        font-family: ui-monospace, Menlo, Consolas, monospace;
        display: grid; place-items: center; }
      a { color: #1a1aff; }
    </style>
  </head>
  <body>
    <p>opening the interface preview… <a href="./web/">enter</a></p>
  </body>
</html>
